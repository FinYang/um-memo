title: Um-memo
author: Yangzhuoran Yang
version: 1.0.0
quarto-required: ">=1.9.0"
contributes:
  formats:
    common:
      format-resources:
        - background/bg-wide.jpg
    pdf:
      papersize: a4
      fontsize: 11pt
      date: today
      date-format: "D MMMM YYYY"
      toc: false
      pdf-engine: pdflatex
      geometry:
      - top=2.5cm
      - bottom=2cm
      - left=2cm
      - right=2cm
      block-headings: false
      cite-method: biblatex
      biblio-style: authoryear-comp
      template-partials:
        - before-title.tex
    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
      fontsize: 11pt
      date: today
      date-format: "D MMMM YYYY"
      lang: en
      region: AU
      paper: a4
      toc: false
      bibliographystyle: apa
      margin:
        top: 2.7cm
        bottom: 2cm
        left: 2cm
        right: 2cm
      font-paths:
        - fonts
